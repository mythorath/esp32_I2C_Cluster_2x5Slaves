; =============================================================================
;  Chimera Lenia - PlatformIO multi-environment project
;  One project, three firmwares sharing lib/shared:
;    env:master   -> ESP32 WROOM-32 DevKit (orchestrator, dual I2C, ST7789, web)
;    env:node_c3  -> ESP32-C3 SuperMini     (Bank A, fixed-point biome, bus 1)
;    env:node_s3  -> ESP32-S3 SuperMini      (Bank B, float32 biome, bus 0, PSRAM)
;
;  build_src_filter compiles only the matching src/<target>/ folder per env;
;  lib/shared/ is auto-included by every env.
; =============================================================================

[platformio]
default_envs = master

[env]
framework = arduino
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -Wall
build_unflags = -std=gnu++11

; -----------------------------------------------------------------------------
; MASTER - ESP32 WROOM-32 DevKit (LX6 x2, WiFi)
;   Bus 0 (Wire)  SDA21/SCL22 ATTN23 -> 5x S3 @ 0x08-0x0C  (Bank B / float)
;   Bus 1 (Wire1) SDA32/SCL33 ATTN25 -> 5x C3 @ 0x18-0x1C  (Bank A / fixed)
;   ST7789 240x240 software SPI: CS27 DC26 RST4 MOSI19 SCLK18
; -----------------------------------------------------------------------------
[env:master]
platform = espressif32
board = esp32dev
build_src_filter = +<master/> -<node_c3/> -<node_s3/>
build_flags =
    ${env.build_flags}
    -DROLE_MASTER
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.3
    bblanchon/ArduinoJson@^6.21.5
    links2004/WebSockets@^2.4.1

; -----------------------------------------------------------------------------
; NODE C3 - ESP32-C3 SuperMini (RISC-V @160MHz). Bank A "instinct" (fixed-point)
;   I2C SDA20/SCL21, ATTN1. Address set per board in src/node_c3/main.cpp.
; -----------------------------------------------------------------------------
[env:node_c3]
platform = espressif32
board = esp32-c3-devkitm-1
build_src_filter = +<node_c3/> -<master/> -<node_s3/>
; Route Serial to the USB-Serial-JTAG (CDC on boot) so it does NOT sit on
; GPIO20/21 - those are the I2C pins. This frees the I2C pins entirely and lets
; us see the C3's serial over USB. Conservative flash mode + 4MB to match the
; SuperMini.
board_build.flash_mode = dio
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.partitions = default.csv
build_flags =
    ${env.build_flags}
    -DROLE_NODE
    -DBIOME_FIXED
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -O2

; -----------------------------------------------------------------------------
; NODE S3 - ESP32-S3 SuperMini (LX7 x2 @240MHz, 4MB PSRAM). Bank B "memory" (float)
;   I2C SDA8/SCL9, ATTN7. Address set per board in src/node_s3/main.cpp.
;   memory_type: SuperMini 4MB PSRAM is quad-SPI -> qio_qspi. If your board is
;   octal (N8R8) use qio_opi instead.
; -----------------------------------------------------------------------------
[env:node_s3]
platform = espressif32
board = esp32-s3-devkitc-1
build_src_filter = +<node_s3/> -<master/> -<node_c3/>
; These S3 SuperMinis have 4MB FLASH (not 8MB as the devkitc-1 default assumes);
; the size mismatch reboot-loops the chip ("Detected size 4096k < header 8192k").
; Pin 4MB flash + a 4MB partition table. Conservative flash mode + native USB CDC
; for serial. PSRAM is NOT required (the firmware keeps its history ring in
; internal RAM); add board_build.arduino.memory_type + -DBOARD_HAS_PSRAM only if
; a given board actually has matching PSRAM.
board_build.flash_mode = dio
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.partitions = default.csv
build_flags =
    ${env.build_flags}
    -DROLE_NODE
    -DBIOME_FLOAT
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -O2
